# 包装装载优化软件 - HTTPS (443) + HTTP fallback (8080)
# Certbot certificates managed by Let's Encrypt

# HTTPS - main app
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name k3-aitable.xyz;

    root /var/www/packing-optimizer;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/k3-aitable.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/k3-aitable.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 金蝶插件配置页 SPA
    location /kingdee/ {
        alias /var/www/kingdee-plugin/frontend/build/;
        try_files $uri $uri/ /kingdee/index.html;
    }

    # 工厂负载监控 SPA
    location /monitor/ {
        alias /var/www/factory-monitor/monitor/;
        try_files $uri $uri/ /monitor/index.html;
    }

    # 工厂负载监控 API 代理
    location /api/monitor/ {
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
    }
}

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name k3-aitable.xyz;
    return 301 https://$host$request_uri;
}

# Port 8080 - direct IP access (no SSL)
server {
    listen 8080;
    server_name _;
    root /var/www/packing-optimizer;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# 金蝶插件 API - api.k3-aitable.xyz
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.k3-aitable.xyz;
    ssl_certificate /etc/letsencrypt/live/api.k3-aitable.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.k3-aitable.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    client_max_body_size 10m;
    location / {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }
}

# api.k3-aitable.xyz HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.k3-aitable.xyz;
    return 301 https://$host$request_uri;
}
